name: Check Pending Migrations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migration-check:
    name: Prisma Migration Status
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for pending or failed migrations
        run: npx prisma migrate status
        # This step fails with exit code 1 if any migrations are pending or
        # in a failed state, blocking the PR merge or deployment pipeline.
